<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Animation Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
:root{--bg:#253f4a;--bg-dark:#1e3340;--slate:#768a91;--sage:#69807b;--sage-dk:#576e69;--sage-mid:#7d9490;--cream:#f0ebe2;--cream-dk:#e4ddd3;--cream-dkr:#d5cec4;--txt-dark:#253f4a;--txt-mid:#4a6470;--txt-muted:#768a91;--code-bg:#1a2f3a;--border-lgt:rgba(240,235,226,0.18);--border-dk:rgba(37,63,74,0.14);--r:10px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;}
.header{background:var(--bg-dark);border-bottom:1px solid var(--border-lgt);padding:22px 40px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
.header-title{font-family:'Lora',Georgia,serif;font-size:1.4rem;font-weight:500;color:var(--cream);letter-spacing:-0.01em;}
.header-title em{font-style:italic;color:var(--sage-mid);}
.pre-container {position:relative;max-width:1700px;margin:0 auto;padding:22px 40px 40px;background:var(--bg-dark);border-bottom:1px solid var(--border-lgt); background-color: var(--cream); color: var(--txt-dark);}
#pre-global {width: fit-content; margin: 0 auto;}
.watermark{font-size:0.62rem;color:rgba(240,235,226,0.28);letter-spacing:0.07em;font-style:italic;font-family:'Lora',Georgia,serif;white-space:nowrap;padding-top:3px;flex-shrink:0;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border-lgt);background:transparent;color:rgba(240,235,226,0.5);cursor:pointer;font-family:'Inter',sans-serif;font-size:0.73rem;font-weight:500;letter-spacing:0.02em;transition:all 0.2s;white-space:nowrap;}
.filter-btn:hover{border-color:rgba(240,235,226,0.45);color:var(--cream);}
.filter-btn.active{background:var(--sage);border-color:var(--sage);color:var(--cream);font-weight:600;}
.grid{column-count:4;column-gap:14px;padding:24px 40px 60px;max-width:1700px;margin:0 auto;}
.card{display:block;break-inside:avoid;margin-bottom:14px;background:var(--cream);border:1px solid var(--border-dk);border-radius:var(--r);overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(30,51,64,0.32);}
.preview{height:160px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;border-bottom:1px solid rgba(37,63,74,0.28);}
.preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,160,110,0.3),transparent);pointer-events:none;z-index:2;}
.preview-hint{position:absolute;bottom:6px;right:8px;font-size:0.58rem;color:rgba(196,160,110,0.4);letter-spacing:0.06em;text-transform:uppercase;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:3;}
.card:hover .preview-hint{opacity:1;}
.preview-el{height:88px;width:auto;overflow:visible;filter:drop-shadow(0 3px 12px rgba(0,0,0,0.45));transform-origin:center bottom;flex-shrink:0;}
.preview-bg-svg{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:center center;display:block;}
.preview-cta-el{background:#c4a06e;color:#fff;padding:10px 24px;border-radius:50px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.02em;white-space:nowrap;cursor:default;user-select:none;transform-origin:center center;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.preview-stamp-el{width:92px;height:92px;overflow:visible;transform-origin:center center;flex-shrink:0;}
.preview-text-clip{font-family:'Lora',Georgia,serif;font-style:italic;color:#c4a06e;filter:drop-shadow(0 1px 8px rgba(0,0,0,0.5));user-select:none;pointer-events:none;text-align:center;line-height:1.3;}
.preview-text-h{font-size:1.55rem;font-weight:500;white-space:nowrap;letter-spacing:-0.03em;}
.preview-text-v{font-size:1.65rem;font-weight:600;}
.preview-letter-el{font-family:'Lora',Georgia,serif;font-style:italic;color:#c4a06e;font-size:1.45rem;letter-spacing:-0.02em;filter:drop-shadow(0 1px 8px rgba(0,0,0,0.5));user-select:none;pointer-events:none;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;line-height:1;gap:0;}
.preview-letter-el span{display:inline-block;}
.preview-letter-el .spc{display:inline-block;width:0.28em;}
.preview-letter-el .word-span{display:inline-block;}
@keyframes dinoStomp{0%,100%{transform:translateY(0) rotate(0deg)}20%{transform:translateY(-5px) rotate(-1.5deg)}45%{transform:translateY(2px) rotate(1deg) scaleY(0.97) scaleX(1.02)}70%{transform:translateY(-3px) rotate(-0.8deg)}}
@keyframes dinoCharge{0%,100%{transform:rotate(0deg) translateX(0)}35%{transform:rotate(-5deg) translateX(-3px)}65%{transform:rotate(2deg) translateX(2px)}}
@keyframes dinoNeck{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-6deg) translateX(-4px)}65%{transform:rotate(5deg) translateX(4px)}}
@keyframes dinoLumber{0%,100%{transform:translateX(0) rotate(0deg)}33%{transform:translateX(-5px) rotate(-2.5deg)}66%{transform:translateX(5px) rotate(2deg)}}
@keyframes dinoSoar{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(-5deg)}55%{transform:translateY(-14px) rotate(0deg)}80%{transform:translateY(-7px) rotate(4deg)}}
@keyframes dinoStalk{0%,100%{transform:translateY(0) rotate(0deg)}35%{transform:translateY(-7px) rotate(-3deg) scaleY(1.03)}70%{transform:translateY(-4px) rotate(-1deg)}}
@keyframes dinoSwing{0%,100%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-6px) rotate(-3deg)}75%{transform:translateX(6px) rotate(3deg)}}
@keyframes dinoSail{0%,100%{transform:rotate(0deg) translateX(0)}30%{transform:rotate(-3deg) translateX(-2px)}65%{transform:rotate(3deg) translateX(2px)}}
@keyframes dinoCrest{0%,100%{transform:rotate(0deg) translateY(0)}40%{transform:rotate(5deg) translateY(-4px)}70%{transform:rotate(-2deg) translateY(-2px)}}
@keyframes dinoDome{0%,100%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-8px) scaleY(1.04)}55%{transform:translateY(-6px) scaleY(1.02)}}
@keyframes dinoSweep{0%,100%{transform:rotate(0deg)}40%{transform:rotate(-7deg) translateX(-3px)}75%{transform:rotate(6deg) translateX(3px)}}
.idle-stomp{animation:dinoStomp 2.4s ease-in-out infinite;}
.idle-charge{animation:dinoCharge 2.8s ease-in-out infinite;}
.idle-neck{animation:dinoNeck 3.2s ease-in-out infinite;}
.idle-lumber{animation:dinoLumber 2.6s ease-in-out infinite;}
.idle-soar{animation:dinoSoar 3.0s ease-in-out infinite;}
.idle-stalk{animation:dinoStalk 2.0s ease-in-out infinite;}
.idle-swing{animation:dinoSwing 2.2s ease-in-out infinite;}
.idle-sail{animation:dinoSail 3.0s ease-in-out infinite;}
.idle-crest{animation:dinoCrest 2.6s ease-in-out infinite;}
.idle-dome{animation:dinoDome 1.8s ease-in-out infinite;}
.idle-sweep{animation:dinoSweep 3.6s ease-in-out infinite;}
.card-body{padding:11px 14px 10px;border-bottom:1px solid var(--border-dk);}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:0.59rem;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
.tag-entrada{background:rgba(105,128,123,0.14);color:#4a7068;}
.tag-salida{background:rgba(148,88,68,0.12);color:#7a4232;}
.tag-cta{background:rgba(136,118,48,0.12);color:#6e5e18;}
.tag-fondo{background:rgba(80,88,148,0.12);color:#404890;}
.tag-clip{background:rgba(48,88,148,0.12);color:#304680;}
.tag-compuesta{background:rgba(90,50,140,0.13);color:#7040a8;}
.card-title{font-size:0.86rem;font-weight:600;color:var(--txt-dark);margin-bottom:3px;line-height:1.3;}
.card-desc{font-size:0.72rem;color:var(--txt-mid);line-height:1.5;margin-bottom:9px;}
.card-actions{display:flex;gap:7px;}
.btn{padding:7px 13px;border-radius:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.74rem;font-weight:500;letter-spacing:0.01em;transition:all 0.15s;}
.btn-play{background:var(--sage);color:var(--cream);flex:1;}
.btn-play:hover{background:var(--sage-dk);}
.btn-play:active{transform:scale(0.97);}
.btn-code{background:transparent;color:var(--txt-muted);border:1px solid var(--border-dk);font-size:0.7rem;}
.btn-code:hover{background:rgba(37,63,74,0.07);border-color:var(--slate);color:var(--txt-dark);}
.params{padding:8px 14px;background:var(--cream-dk);display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border-dk);}
.param{display:flex;flex-direction:column;gap:3px;flex:1;min-width:62px;}
.param label{font-size:0.58rem;color:var(--txt-muted);text-transform:uppercase;letter-spacing:0.5px;display:flex;justify-content:space-between;align-items:center;}
.param label span{color:var(--sage-dk);font-weight:600;font-size:0.67rem;text-transform:none;letter-spacing:0;}
.param input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:var(--cream-dkr);border-radius:2px;outline:none;cursor:pointer;}
.param input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--sage);cursor:pointer;border:2px solid var(--cream);box-shadow:0 1px 4px rgba(37,63,74,0.2);transition:transform 0.1s;}
.param input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
.code-panel{display:none;background:var(--code-bg);padding:12px 14px;position:relative;}
.code-panel.open{display:block;}
.code-panel pre{font-family:'Consolas','Fira Code','Monaco',monospace;font-size:0.68rem;line-height:1.72;color:#c4a06e;white-space:pre-wrap;word-break:break-word;padding-right:60px;}
#pre-global{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.btn-copy{position:absolute;top:8px;right:8px;padding:4px 10px;background:var(--sage);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.64rem;font-weight:600;letter-spacing:0.02em;transition:background 0.15s;white-space:nowrap;}
.btn-copy.btn-copy-center {bottom: 10px; left: 50%; transform: translateX(-50%); width: fit-content; top: unset;}
.btn-copy:hover{background:var(--sage-dk);}
.btn-copy.copied{background:#4a7a58;}

<body>
<div class="header">
  <div class="header-top">
    <h1 class="header-title"><em>Animation</em> Library</h1>
    <span class="watermark">Made by Lydia Vega</span>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filterBy('all',this)">Todas</button>
    <button class="filter-btn" onclick="filterBy('entrada',this)">Entrada</button>
    <button class="filter-btn" onclick="filterBy('salida',this)">Salida</button>
    <button class="filter-btn" onclick="filterBy('cta',this)">CTA</button>
    <button class="filter-btn" onclick="filterBy('fondo',this)">Fondo</button>
    <button class="filter-btn" onclick="filterBy('clip',this)">ClipPath</button>
    <button class="filter-btn" onclick="filterBy('compuesta',this)">Copy</button>
  </div>
</div>
<div class="pre-container" id="pre-container">
  <button class="btn-copy btn-copy-center" onclick="copyCode('global',this)">Copiar</button>

</div>

var store = {};
ANIMS.forEach(function(a){
  store[a.id]={};
  Object.keys(a.params).forEach(function(k){store[a.id][k]=a.params[k].val;});
});

function renderGrid(tag){
  tag=tag||'all';
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var list=tag==='all'?ANIMS:ANIMS.filter(function(a){return a.tag===tag;});
  list.forEach(function(a,i){
    var dino=DINOS[i%DINOS.length];
    var type=a.previewType||'dino';
    var pEl;
    if     (type==='cta')    pEl=mkCTAEl(a.previewText,a.id);
    else if(type==='clip')   pEl=mkClipEl(a.previewText,a.id,'preview-text-clip preview-text-h');
    else if(type==='clip-v') pEl=mkClipEl(a.previewText,a.id,'preview-text-clip preview-text-v');
    else if(type==='letter') pEl=mkLetterEl(a.previewText,a.id);
    else if(type==='word')   pEl=mkWordEl(a.previewText,a.id);
    else if(type==='split')  pEl=mkSplitEl(a.previewText,a.id);
    else if(type==='stamp')  pEl=mkStampEl(a.id,a.stampSvg);
    else if(type==='bg-svg') pEl=mkBgSvgEl(a.bgSvg,a.id);
    else pEl='<svg class="preview-el '+dino.idle+'" id="el-'+a.id+'" viewBox="0 0 '+dino.w+' '+dino.h+'" xmlns="http://www.w3.org/2000/svg" data-type="dino" data-idle="'+dino.idle+'">'+dino.svg+'</svg>';
    var ph=Object.keys(a.params).map(function(k){var p=a.params[k];return '<div class="param"><label>'+p.label+' <span id="v-'+a.id+'-'+k+'">'+p.val+'</span></label><input type="range" min="'+p.min+'" max="'+p.max+'" step="'+p.step+'" value="'+p.val+'" oninput="onParam(\''+a.id+'\',\''+k+'\',this.value)"></div>';}).join('');
    var card=document.createElement('div');
    card.className='card';
    card.innerHTML='<div class="preview" onclick="play(\''+a.id+'\')">'+pEl+'<span class="preview-hint">click para reproducir</span></div>'
      +'<div class="card-body"><div class="tag tag-'+a.tag+'">'+(TAG_LABELS[a.tag]||a.tag)+'</div>'
      +'<div class="card-title">'+a.title+'</div><div class="card-desc">'+a.desc+'</div>'
      +'<div class="card-actions"><button class="btn btn-play" onclick="play(\''+a.id+'\')">Play</button>'
      +'<button class="btn btn-code" id="btc-'+a.id+'" onclick="toggleCode(\''+a.id+'\')">{ } Código</button></div></div>'
      +'<div class="params">'+ph+'</div>'
      +'<div class="code-panel" id="code-'+a.id+'"><button class="btn-copy" onclick="copyCode(\''+a.id+'\',this)">Copiar</button>'
      +'<pre id="pre-'+a.id+'">'+a.code(store[a.id])+'</pre></div>';
    grid.appendChild(card);
  });
  setTimeout(function(){list.forEach(function(a,i){setTimeout(function(){play(a.id);},i*85);});},300);
}

function play(id){
  var a=ANIMS.filter(function(x){return x.id===id;})[0];
  var el=document.getElementById('el-'+id);
  if(!el||!a)return;
  var elType=el.dataset.type||(a.previewType||'dino');
  var idleClass=el.dataset.idle||'';
  var isDino=elType==='dino';
  var isLetter=['letter','split','word'].indexOf(a.previewType)>-1;
  if(idleClass)el.classList.remove(idleClass);
  gsap.killTweensOf(el);
  if(isLetter)gsap.killTweensOf(el.querySelectorAll('span'));
  gsap.set(el,{clearProps:'all'});
  if(isLetter)gsap.set(el.querySelectorAll('span'),{clearProps:'all'});
  el.style.cssText='';
  requestAnimationFrame(function(){requestAnimationFrame(function(){a.play(el,store[id]);});});
  if(isDino&&idleClass){
    clearTimeout(el._idleTimer);
    el._idleTimer=setTimeout(function(){
      gsap.set(el,{clearProps:'transform,opacity,x,y,scaleX,scaleY,rotation,clipPath,filter'});
      el.style.cssText='';
      requestAnimationFrame(function(){el.classList.add(idleClass);});
    },3600);
  }
}

function onParam(id,key,val){
  var num=parseFloat(val);
  store[id][key]=num;
  var v=document.getElementById('v-'+id+'-'+key);
  if(v)v.textContent=num;
  var pre=document.getElementById('pre-'+id);
  if(pre){var a=ANIMS.filter(function(x){return x.id===id;})[0];pre.textContent=a.code(store[id]);}
  play(id);
}

function toggleCode(id){
  var panel=document.getElementById('code-'+id);
  var btn=document.getElementById('btc-'+id);
  /*
  // Versión original comentada para permitir animaciones jQuery (slideUp/slideDown):
  var open=panel.classList.toggle('open');
  btn.textContent=open?'{ } Ocultar':'{ } Código';
  if(open){var a=ANIMS.filter(function(x){return x.id===id;})[0];document.getElementById('pre-'+id).textContent=a.code(store[id]);}
  */

  // Nuevo comportamiento: usar jQuery slideUp/slideDown y mantener la actualización del código
  var $panel = jQuery('#code-'+id);
  var $btn = jQuery('#btc-'+id);
  if($panel.is(':visible')){
    $panel.stop(true,true).slideUp(200, function(){
      $panel.removeClass('open');
      $btn.text('{ } Código');
    });
  } else {
    // rellenar el <pre> antes de abrir para evitar parpadeos
    var a = ANIMS.filter(function(x){return x.id===id;})[0];
    if(a){ jQuery('#pre-'+id).text(a.code(store[id])); }
    $panel.stop(true,true).slideDown(200, function(){
      $panel.addClass('open');
      $btn.text('{ } Ocultar');
    });
  }
}

function copyCode(id,btn){
  var text=document.getElementById('pre-'+id).textContent;
  var done=function(){btn.textContent='Copiado';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('copied');},2000);};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(function(){fallback(text,done);});}
  else{fallback(text,done);}
}
function fallback(text,cb){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(ta);
}

function filterBy(tag,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderGrid(tag);
}

renderGrid();
